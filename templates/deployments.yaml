{{- range $.Values.components }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ $.Release.Namespace }}
  name: icat-core-{{ .name}}-deployment-{{ $.Release.Name }}
  labels:
    app: icat
    tier: core
    component: {{ .name }}
    release: {{ $.Release.Name }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      app: icat
      tier: core
      component: {{ .name }}
      release: {{ $.Release.Name }}
  #strategy:
  #  type: RollingUpdate
  #  rollingUpdate:
  #    maxUnavailable: 1
  template:
    metadata:
      labels:
        app: icat
        tier: core
        component: {{ .name }}
        release: {{ $.Release.Name }}
    spec:
      {{- if $.Values.deploymentPriorityClassName}}
      priorityClassName: {{$.Values.deploymentPriorityClassName}}
      {{- end}}
      initContainers:
        - name: init-{{ .name }}-setup
          image: {{ $.Values.images.initContainers.python }}
          env:
            - name: TZ
              value: {{ $.Values.timezone }}
            - name: CONTAINER_TYPE
              value: {{ lower .containerType }}
            {{- if $.Values.elasticAPM.enabled }}
            - name: ELASTIC_APM_LOG_SENDING
              value: "{{ $.Values.elasticAPM.apm.apmLogSending }}"
            - name: ELASTIC_APM_ENVIRONMENT
              value: "{{ $.Values.elasticAPM.apm.environment }}"
            - name: ELASTIC_APM_SERVER_URL
              value: {{ $.Values.elasticAPM.apm.serverUrl }}
            - name: APM_SERVICE_NAME
              value: {{$.Values.elasticAPM.apm.serviceNamePrefix}}-{{ .name}}
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.elasticAPM.apm.secretTokenSecretName }}
                  key: token
            {{- end }}
          command:
            - "sh"
            - "-c"
            - |
              {{ include "component-init-container-setup-script" (dict "component" . "root" $) | nindent 14 }}
          volumeMounts:
            - name: shared-deployments-dir
              mountPath: /opt/payara/deployments
            - name: shared-libs-dir
              mountPath: /opt/payara/libs
            {{- if .setupProperties }}
            - name: setup-properties
              mountPath: /opt/payara/deployments/setup.properties
              subPath: setup.properties
            {{- end }}
            {{- if .runProperties }}
            - name: run-properties
              mountPath: /opt/payara/deployments/run.properties
              subPath: run.properties
            {{- end }}
            {{- if .logbackXml }}
            - name: logback-xml
              mountPath: /opt/payara/deployments/logback.xml
              subPath: logback.xml
            {{- end }}
            {{- if .xslt }}
            - name: external-xslt
              mountPath: /opt/payara/xslt/
            {{- end }}
            {{- if .synonymTxt }}
            - name: synonym-txt
              mountPath: /opt/payara/deployments/synonym.txt
            {{- end }}
        {{- if .startupDependencies }}
        - name: init-wait-for-dependent-svc-availability
          image: {{ $.Values.images.initContainers.curl }}
          command:
            - "sh"
            - "-c"
            - |
              urls="
              {{- range .startupDependencies }}
              http://icat-core-{{ .name}}-service-{{ $.Release.Name }}:{{.port}}{{ .path }}
              {{- end }}
              "
              while true; do
                all_ok=true

                for url in $urls; do
                  status=$(curl -sw '%{http_code}' --max-time 5 "$url" -o /dev/null)
                  echo "Checking $url - Status: $status"

                  if [ "$status" -ne 200 ]; then
                    all_ok=false
                  fi
                done

                if [ "$all_ok" = true ]; then
                  break
                fi
                sleep 2
              done

        {{- end }}
      containers:
        - name: icat-core-{{ .name}}
          {{- if eq .containerType "serverFull" }}
          image: {{ $.Values.images.container.serverFull }}
          {{- else }}
          image: {{ $.Values.images.container.micro }}
          {{- end}}
          imagePullPolicy: Always
          {{- if .containerSecurityContext}}
          securityContext:
            {{- toYaml .containerSecurityContext | nindent 12 }}
          {{- end}}
          command:
            {{- if eq .containerType "micro" }}
            # The creation of the glassfish-acc.xml is necessary for the ICAT server to run as otherwise will
            # fail to detect the container type and will not start (see following file, function at line 27):
            # https://github.com/icatproject/icat.utils/blob/master/src/main/java/org/icatproject/utils/ContainerGetter.java
            - "sh"
            - "-c"
            - |

              touch /opt/payara/glassfish-acc.xml && \
              java \
              {{- if $.Values.elasticAPM.enabled }}
              -javaagent:/opt/payara/libs/elastic-apm-agent.jar \
              -Delastic.apm.service_name={{$.Values.elasticAPM.apm.serviceNamePrefix}}-{{ .name}} \
              -Delastic.apm.application_packages={{$.Values.elasticAPM.apm.packageNames}} \
              {{- end }}
              -jar /opt/payara/payara-micro.jar \
              --addlibs /opt/payara/libs/ \
              --postbootcommandfile /opt/payara/deployments/post_boot_asadmin_commands \
              --deploydir /opt/payara/deployments/
            {{- else}}
                        # The creation of the glassfish-acc.xml is necessary for the ICAT server to run as otherwise will
            # fail to detect the container type and will not start (see following file, function at line 27):
            # https://github.com/icatproject/icat.utils/blob/master/src/main/java/org/icatproject/utils/ContainerGetter.java
            - "sh"
            - "-c"
            - |
              touch /opt/payara/glassfish-acc.xml && \
              /opt/payara/scripts/entrypoint.sh
            {{- end}}
          env:
            - name: TZ
              value: {{ $.Values.timezone }}
            {{- if eq .containerType "serverFull" }}
            - name: POSTBOOT_COMMANDS
              value: /opt/payara/deployments/post_boot_asadmin_commands
            {{- end}}
            {{- if $.Values.elasticAPM.enabled }}
            {{- if eq .containerType "serverFull" }}
            - name: JVM_ARGS
              value: "{{ include "elasticapmJvmArgs" (dict "component" . "root" $) | trim | nindent 14 }}"
            {{- end}}
            - name: ELASTIC_APM_LOG_SENDING
              value: "{{ $.Values.elasticAPM.apm.apmLogSending }}"
            - name: ELASTIC_APM_ENVIRONMENT
              value: "{{ $.Values.elasticAPM.apm.environment }}"
            - name: ELASTIC_APM_SERVER_URL
              value: {{ $.Values.elasticAPM.apm.serverUrl }}
            - name: APM_SERVICE_NAME
              value: {{$.Values.elasticAPM.apm.serviceNamePrefix}}-{{ .name}}
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.elasticAPM.apm.secretTokenSecretName }}
                  key: token
            {{- end }}
          ports:
            - containerPort: 8080
              name: http
          {{- if .resources }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          {{- end }}
          {{- if .readinessProbe }}
          readinessProbe:
            {{- toYaml .readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .livenessProbe }}
          livenessProbe:
            {{- toYaml .livenessProbe | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- if .mountInstrumentStorage }}
          {{- range $.Values.instrumentStorage.storageList }}
            - name: {{ .name }}
              {{- if $.Values.instrumentStorage.mountPrefix }}
              mountPath: {{$.Values.instrumentStorage.mountPrefix}}{{ .mountPath }}
              {{- else }}
              mountPath: {{ .mountPath }}
              {{- end }}
              readOnly: {{ .readOnly }}
          {{- end }}
          {{- end }}
            - name: shared-deployments-dir
              mountPath: /opt/payara/deployments/
            - name: shared-libs-dir
              mountPath: /opt/payara/libs/
          {{- if .xslt }}
            - name: external-xslt
              mountPath: /opt/payara/xslt/
          {{- end}}
          {{- if .cacheDir }}
            - name: cache-dir
              mountPath: /opt/{{.name}}/cache/
          {{- end }}
      restartPolicy: Always
      {{- if $.Values.imagePullSecretName}}
      imagePullSecrets:
        - name: {{ $.Values.imagePullSecretName }}
      {{- end }}
      volumes:
        - name: shared-deployments-dir
          emptyDir: { }
        - name: shared-libs-dir
          emptyDir: { }
        {{- if .cacheDir }}
        - name: cache-dir
          emptyDir: { }
        {{- end }}
        {{- if .setupProperties }}
        - name: setup-properties
          secret:
            secretName: icat-core-setup-properties-{{ $.Release.Name }}
            items:
              - key: {{.name}}
                path: setup.properties
        {{- end}}
        {{- if .runProperties }}
        - name: run-properties
          secret:
            secretName: icat-core-run-properties-{{ $.Release.Name }}
            items:
              - key: {{.name}}
                path: run.properties
        {{- end }}
        {{- if .logbackXml }}
        - name: logback-xml
          configMap:
            name: icat-core-logback-{{ $.Release.Name }}
            items:
              - key: {{.name}}
                path: logback.xml
        {{- end }}
        {{- if .xslt }}
        - name: external-xslt
          configMap:
            name: icat-core-xslt-{{ $.Release.Name }}
        {{- end }}
        {{- if .synonymTxt }}
        - name: synonym-txt
          configMap:
            name: icat-core-synonym-txt-{{ $.Release.Name }}
        {{- end }}
        {{- if .mountInstrumentStorage }}
        {{- range $.Values.instrumentStorage.storageList }}
        - name: {{ .name }}
        {{- if .nfs }}
          nfs:
          {{- toYaml .nfs | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- end }}
status: { }
{{- end }}
