{{- range $.Values.components }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ $.Values.namespace }}
  name: icat-core-{{ .name}}-deployment-{{ $.Values.environment }}
  labels:
    app: icat
    env: {{ $.Values.environment }}
    tier: core
    component: {{ .name }}
    release: {{ $.Release.Name }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      app: icat
      env: {{ $.Values.environment }}
      tier: core
      component: {{ .name }}
      release: {{ $.Release.Name }}
  #strategy:
  #  type: RollingUpdate
  #  rollingUpdate:
  #    maxUnavailable: 1
  template:
    metadata:
      labels:
        app: icat
        env: {{ $.Values.environment }}
        tier: core
        component: {{ .name }}
        release: {{ $.Release.Name }}
    spec:
      {{- if $.Values.deploymentPriorityClassName}}
      priorityClassName: {{$.Values.deploymentPriorityClassName}}
      {{- end}}
      initContainers:
        - name: init-{{ .name }}-{{ $.Values.environment }}-setup
          image: {{ $.Values.images.initContainers.python }}
          env:
            - name: DASH_PWD
              value: "Present Working Dilemma"
            - name: CONTAINER_TYPE
              value: {{ lower .containerType }}
            {{- if eq (include "hasItemInList" (dict "item" "activeMQRAR" "list" .additionalArtifacts)) "true" }}
            - name: BROKER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.brokerConfigSecretName }}-{{ $.Values.environment }}
                  key: username
            - name: BROKER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.brokerConfigSecretName }}-{{ $.Values.environment }}
                  key: password
            - name: BROKER_HOST
              value: icat-core-broker-service-{{ $.Values.environment }}
            {{- end}}
          command:
            - "sh"
            - "-c"
            - |
              {{ include "component-init-container-setup-script" (dict "component" . "root" $) | nindent 14 }}
          volumeMounts:
            - name: shared-deployments-dir
              mountPath: /opt/payara/deployments
            - name: shared-libs-dir
              mountPath: /opt/payara/libs
            {{- if eq (include "hasItemInList" (dict "item" "setup-properties" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
            - name: setup-properties
              mountPath: /opt/payara/deployments/setup.properties
              subPath: setup.properties
            {{- end }}
            {{- if eq (include "hasItemInList" (dict "item" "run-properties" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
            - name: run-properties
              mountPath: /opt/payara/deployments/run.properties
              subPath: run.properties
            {{- end }}
            {{- if eq (include "hasItemInList" (dict "item" "logback" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
            - name: logback-xml
              mountPath: /opt/payara/deployments/logback.xml
              subPath: logback.xml
            {{- end }}
            {{- if eq (include "hasItemInList" (dict "item" "oaipmh-xslt" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
            - name: external-xslt
              mountPath: /opt/payara/xslt/
            {{- end }}
            {{- if eq (include "hasItemInList" (dict "item" "activeMQRAR" "list" .additionalArtifacts)) "true" }}
            - name: rar-dir
              mountPath: /opt/payara/rar/
            {{- end}}
        {{- if .startupDependencies }}
        - name: init-{{ $.Values.environment }}-wait-for-dependent-svc-availability
          image: {{ $.Values.images.initContainers.curl }}
          command:
            - "sh"
            - "-c"
            - |
              urls="
              {{- range .startupDependencies }}
              http://icat-core-{{ .name}}-service-{{ $.Values.environment }}:{{.port}}{{ .path }}
              {{- end }}
              "
              while true; do
                all_ok=true

                for url in $urls; do
                  status=$(curl -sw '%{http_code}' --max-time 5 "$url" -o /dev/null)
                  echo "Checking $url - Status: $status"

                  if [ "$status" -ne 200 ]; then
                    all_ok=false
                  fi
                done

                if [ "$all_ok" = true ]; then
                  break
                fi
                sleep 5
              done

        {{- end }}
      containers:
        - name: icat-core-{{ .name}}-{{ $.Values.environment }}
          {{- if eq .containerType "serverFull" }}
          image: {{ $.Values.images.container.serverFull }}
          {{- else }}
          image: {{ $.Values.images.container.micro }}
          {{- end}}
          imagePullPolicy: Always
          {{- if .containerSecurityContext}}
          securityContext:
            {{- toYaml .containerSecurityContext | nindent 12 }}
          {{- end}}
          command:
            # The creation of the glassfish-acc.xml is necessary for the ICAT server to run as otherwise will
            # fail to detect the container type and will not start (see following file, function at line 27):
            # https://github.com/icatproject/icat.utils/blob/master/src/main/java/org/icatproject/utils/ContainerGetter.java
            - "sh"
            - "-c"
            - |

              touch /opt/payara/glassfish-acc.xml && \
              java \
              {{- if $.Values.elasticAPM.enabled }}
              -javaagent:/opt/payara/libs/elastic-apm-agent.jar \
              -Delastic.apm.service_name={{$.Values.elasticAPM.apm.serviceNamePrefix}}-{{ .name}}-{{ $.Values.environment }} \
              -Delastic.apm.application_packages=es.cells.icat.authn_alba,org.icatproject.authn_anon,org.icatproject.authn_db,org.icatproject.icat_oaipmh,org.icatproject.exposed,org.icatproject.ids \
              {{- end }}
              -jar /opt/payara/payara-micro.jar \
              --addlibs /opt/payara/libs/ \
              --postbootcommandfile /opt/payara/deployments/post_boot_asadmin_commands \
              --deploydir /opt/payara/deployments/
          env:
            - name: DASH_PWD
              value: "Present Working Dilemma"
            {{- if eq .containerType "serverFull" }}
            - name: POSTBOOT_COMMANDS
              value: /opt/payara/deployments/post_boot_asadmin_commands
            {{- end}}
            {{- if $.Values.elasticAPM.enabled }}
            - name: ELASTIC_APM_LOG_SENDING
              value: "{{ $.Values.elasticAPM.apm.apmLogSending }}"
            - name: ELASTIC_APM_ENVIRONMENT
              value: {{ $.Values.environment }}
            - name: ELASTIC_APM_SERVER_URL
              value: {{ $.Values.elasticAPM.apm.serverUrl }}
            - name: APM_SERVICE_NAME
              value: {{$.Values.elasticAPM.apm.serviceNamePrefix}}-{{ .name}}-{{ $.Values.environment }}
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.elasticAPM.apm.secretTokenSecretName }}
                  key: token
            {{- end }}
          ports:
          {{- if eq .containerType "serverFull" }}
            - containerPort: 7676
              name: openmq
          {{- end}}
            - containerPort: 8080
              name: http
          {{- if .resources }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          {{- end }}
          {{- if .readinessProbe }}
          readinessProbe:
            {{- toYaml .readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .livenessProbe }}
          livenessProbe:
            {{- toYaml .livenessProbe | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- if .mountInstrumentStorage }}
          {{- range $.Values.instrumentStorage.storageList }}
            - name: {{ .name }}
              {{- if $.Values.instrumentStorage.mountPrefix }}
              mountPath: {{$.Values.instrumentStorage.mountPrefix}}{{ .mountPath }}
              {{- else }}
              mountPath: {{ .mountPath }}
              {{- end }}
              readOnly: {{ .readOnly }}
          {{- end }}
          {{- end }}
            - name: shared-deployments-dir
              mountPath: /opt/payara/deployments/
            - name: shared-libs-dir
              mountPath: /opt/payara/libs/
          {{- if eq (include "hasItemInList" (dict "item" "activeMQRAR" "list" .additionalArtifacts)) "true" }}
            - name: rar-dir
              mountPath: /opt/payara/rar/
          {{- end}}
          {{- if eq (include "hasItemInList" (dict "item" "oaipmh-xslt" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
            - name: external-xslt
              mountPath: /opt/payara/xslt/
          {{- end}}
          {{- if eq (include "hasItemInList" (dict "item" "cache-dir" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
            - name: cache-dir
              mountPath: /opt/{{.name}}/cache/
          {{- end }}
      restartPolicy: Always
      {{- if $.Values.imagePullSecretName}}
      imagePullSecrets:
        - name: {{ $.Values.imagePullSecretName }}
      {{- end }}
      volumes:
        - name: shared-deployments-dir
          emptyDir: { }
        - name: shared-libs-dir
          emptyDir: { }
        {{- if eq (include "hasItemInList" (dict "item" "cache-dir" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
        - name: cache-dir
          emptyDir: { }
        {{- end }}
        {{- if eq (include "hasItemInList" (dict "item" "activeMQRAR" "list" .additionalArtifacts)) "true" }}
        - name: rar-dir
          emptyDir: { }
        {{- end}}
        {{- if eq (include "hasItemInList" (dict "item" "setup-properties" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
        - name: setup-properties
          secret:
            secretName: {{ $.Values.setupPropertiesSecretName }}-{{ $.Values.environment }}
            items:
              - key: {{.name}}
                path: setup.properties
        {{- end}}
        {{- if eq (include "hasItemInList" (dict "item" "run-properties" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
        - name: run-properties
          secret:
            secretName: {{ $.Values.runPropertiesSecretMapName }}-{{ $.Values.environment }}
            items:
              - key: {{.name}}
                path: run.properties
        {{- end }}
        {{- if eq (include "hasItemInList" (dict "item" "logback" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
        - name: logback-xml
          configMap:
            name: {{ $.Values.logbackConfigMapName }}-{{ $.Values.environment }}
            items:
              - key: {{.name}}
                path: logback.xml
        {{- end }}
        {{- if eq (include "hasItemInList" (dict "item" "oaipmh-xslt" "list" .optionalVolumesSecretsAndConfigMapsMounts)) "true" }}
        - name: external-xslt
          configMap:
            name: {{ $.Values.oaipmhXSLTConfigMapName }}-{{ $.Values.environment }}
        {{- end }}
        {{- if .mountInstrumentStorage }}
        {{- range $.Values.instrumentStorage.storageList }}
        - name: {{ .name }}
        {{- if .nfs }}
          nfs:
          {{- toYaml .nfs | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- end }}
status: { }
{{- end }}
