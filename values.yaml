global:
  namespace: "icat-core-test"
  environment: "test"
  images:
    container: "registry.cells.es/docker/payara/micro:6.2025.2-jdk21"
    initContainer:
      # Must be image running as root (need to install curl)
      python: "registry.cells.es/docker/python:3.12.9-bullseye"
      curl: "registry.cells.es/docker/curlimages/curl:8.12.1"
  artifacts:
    repositoryURL: "https://misdockerprod02.cells.es/nexus/repository/icat-alba"
    databaseConnector:
      name: "mariadb-java-client"
      version: "3.5.2"
  setupPropertiesSecretName: "icat-core-setup-properties"
  runPropertiesConfigMapName: "icat-core-run-properties"
  oaipmhXSLTConfigMapName: "icat-core-oaipmh-xslt"
  logbackConfigMapName: "icat-core-logback"
  initScriptsURL: "https://git.cells.es/mis-devops/icat-public/icat-k8s/-/raw/master/setup_scripts"

elasticAPM:
  enabled: true
  version: "1.50.0"
  apm:
    serverUrl: "https://kubeelasticmis.cells.es/apm"
    apmLogSending: true
    secretTokenSecretName: "elastic-apm-token"

components:
  # authn.anon -- ANONYMOUS AUTHENTICATION COMPONENT
  - name: "authn-anon"
    repoKey: "authn.anon"
    version: "3.0.0"
    replicas: 1
    secretTokenSecretName: "elastic-apm-token"
    resources:
      requests:
        memory: "500Mi"
    readinessProbe:
      httpGet:
        path: "/authn.anon/version"
        port: 8080
      failureThreshold: 1
      periodSeconds: 100
    mountInstrumentStorage: false
    hasRunProperties: true
    hasSetupProperties: true
    hasLogback: false
    hasExternalXSLT: false
    includeDatabaseJar: false
  # authn.db -- DATABASE AUTHENTICATION COMPONENT
  - name: "authn-db"
    repoKey: "authn.db"
    version: "3.0.0"
    replicas: 1
    secretTokenSecretName: "elastic-apm-token"
    resources:
      requests:
        memory: "500Mi"
    readinessProbe:
      httpGet:
        path: "/authn.db/version"
        port: 8080
      failureThreshold: 1
      periodSeconds: 100
    mountInstrumentStorage: false
    hasRunProperties: true
    hasSetupProperties: true
    hasLogback: true
    hasExternalXSLT: false
    includeDatabaseJar: true
    # authn.oidc -- OPENID CONNECT AUTHENTICATION COMPONENT
  - name: "authn-oidc"
    repoKey: "authn.oidc"
    version: "2.0.1"
    replicas: 1
    secretTokenSecretName: "elastic-apm-token"
    resources:
      requests:
        memory: "500Mi"
    readinessProbe:
      httpGet:
        path: "/authn.oidc/version"
        port: 8080
      failureThreshold: 1
      periodSeconds: 100
    mountInstrumentStorage: false
    hasRunProperties: true
    hasSetupProperties: true
    hasLogback: false
    hasExternalXSLT: false
    includeDatabaseJar: false
  # authn.oaipmh -- OAI-PMH (Open Archive Initiative-Protocol for Metadata Harvesting) COMPONENT
  - name: "icat-oaipmh"
    repoKey: "icat.oaipmh"
    version: "2.0.1"
    replicas: 1
    secretTokenSecretName: "elastic-apm-token"
    resources:
      requests:
        memory: "500Mi"
    readinessProbe:
      httpGet:
        path: "/oaipmh/version"
        port: 8080
      failureThreshold: 1
      periodSeconds: 100
    mountInstrumentStorage: false
    hasRunProperties: true
    hasSetupProperties: true
    hasLogback: true
    hasExternalXSLT: true
    includeDatabaseJar: false
    startupDependencies:
      - name: "icat-server"
        path: "/icat/version/"
  - name: "icat-server"
    repoKey: "icat.server"
    version: "6.1.0"
    replicas: 1
    secretTokenSecretName: "elastic-apm-token"
    resources:
      limits:
        memory: "12Gi"
        cpu: "4.0"
      requests:
        memory: "6Gi"
        cpu: "1.0"
    readinessProbe:
      httpGet:
        path: "/icat/version/"
        port: 8080
      failureThreshold: 1
      periodSeconds: 100
    mountInstrumentStorage: false
    hasRunProperties: true
    hasSetupProperties: true
    hasLogback: true
    includeDatabaseJar: true
    startupDependencies:
      - name: "authn-db"
        path: "/authn.db/version"
      - name: "authn-anon"
        path: "/authn.anon/version"
      - name: "authn-oidc"
        path: "/authn.oidc/version"

